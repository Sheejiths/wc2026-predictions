<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — PDC Friends Prediction Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f2f1;color:#201f1e;min-height:100vh;}
.sticky-top{position:sticky;top:0;z-index:100;}
.header{background:linear-gradient(135deg,#0078d4 0%,#005a9e 100%);color:#fff;padding:16px 20px 12px;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.header h1{font-size:clamp(15px,3.5vw,22px);font-weight:700;}
.header-sub{font-size:12px;color:#c8e0f4;margin-top:3px;}
.header-meta{font-size:11px;color:#a8cce8;margin-top:2px;}
.header-rule{font-size:11px;color:#ffd180;margin-top:4px;}
.header-updated{font-size:11px;color:#90caf9;margin-top:3px;font-style:italic;}
.tabs{display:flex;gap:4px;padding:8px 16px 0;background:#fff;border-bottom:2px solid #edebe9;}
.tab{padding:8px 18px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;color:#605e5c;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;border-radius:4px 4px 0 0;}
.tab.active{color:#0078d4;border-bottom-color:#0078d4;background:#f0f6ff;}
.tab:hover:not(.active){color:#201f1e;background:#f3f2f1;}
.panel{display:none;padding:14px;max-width:1100px;margin:0 auto;}
.panel.active{display:block;}
.loading{text-align:center;padding:60px 20px;color:#605e5c;}
.loading-spinner{width:36px;height:36px;border:3px solid #edebe9;border-top-color:#0078d4;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stat-card{background:#fff;border-radius:8px;padding:12px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);border-top:3px solid #0078d4;}
.stat-val{font-size:24px;font-weight:700;color:#0078d4;}
.stat-lbl{font-size:11px;color:#605e5c;margin-top:2px;}
.invalid-banner{background:#fde7e9;border-left:4px solid #c4314b;border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:#c4314b;margin-bottom:12px;line-height:1.5;}
.match-grid{display:grid;gap:10px;}
.match-card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
.match-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #edebe9;background:#faf9f8;}
.match-title{font-size:14px;font-weight:700;}
.match-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.badge-result{background:#dff6dd;color:#107c10;}
.badge-pending{background:#edebe9;color:#605e5c;}
.match-body{padding:10px 14px;}
.pred-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;cursor:pointer;}
.pred-row:hover .pred-bar-wrap{opacity:.85;}
.pred-label{font-size:12px;color:#605e5c;width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.pred-label.inv-lbl{color:#c4314b;}
.pred-bar-wrap{flex:1;height:24px;background:#edebe9;border-radius:4px;overflow:hidden;}
.pred-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;min-width:36px;}
.pred-bar span{font-size:11px;font-weight:700;color:#000;white-space:nowrap;}
.pred-bar.inv-bar{opacity:.3;}
.pred-pct{font-size:12px;color:#605e5c;width:30px;text-align:right;flex-shrink:0;}
.pip{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:2px;flex-shrink:0;}
.pip3{background:#fff4ce;color:#7d5a00;}
.pip2{background:#dae8f6;color:#004e8c;}
.pip1{background:#dff6dd;color:#0a5c0a;}
.pip-inv{background:#fde7e9;color:#c4314b;font-size:9px;}
.consensus-row{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #edebe9;font-size:12px;}
/* Search bar */
.search-wrap{padding:10px 0 4px;position:relative;}
.search-input{width:100%;height:36px;padding:0 36px 0 12px;font-size:13px;
  border:1.5px solid #edebe9;border-radius:6px;outline:none;background:#fff;color:#201f1e;}
.search-input:focus{border-color:#0078d4;box-shadow:0 0 0 2px rgba(0,120,212,.15);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:#a19f9d;font-size:16px;line-height:1;display:none;}
.search-clear.show{display:block;}
.no-match{text-align:center;padding:30px;color:#a19f9d;font-size:13px;}
/* Group badge */
.group-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;
  background:#e8f0fe;color:#1a56a0;margin-left:8px;letter-spacing:.03em;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:301;max-height:75vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease;}
.modal-sheet.show{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:#d2d0ce;border-radius:2px;margin:10px auto 0;}
.modal-header{padding:12px 16px 10px;border-bottom:1px solid #edebe9;position:sticky;top:0;background:#fff;}
.modal-title{font-size:15px;font-weight:700;color:#201f1e;}
.modal-subtitle{font-size:12px;color:#605e5c;margin-top:2px;}
.modal-body{padding:12px 16px 24px;}
.modal-close{position:absolute;top:10px;right:14px;font-size:22px;background:none;border:none;cursor:pointer;color:#605e5c;line-height:1;padding:4px;}
.member-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f2f1;}
.member-item:last-child{border-bottom:none;}
.member-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.member-name{font-size:13px;font-weight:600;color:#201f1e;}
.member-ts{font-size:10px;color:#a19f9d;margin-top:1px;}
/* Leaderboard */
.lb-wrap{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#605e5c;padding:9px 6px;background:#faf9f8;border-bottom:2px solid #edebe9;text-align:center;}
.lb-table th.left{text-align:left;}
.lb-table th.right{text-align:right;}
.lb-table td{padding:9px 6px;border-bottom:1px solid #f3f2f1;vertical-align:middle;}
.lb-table tr:last-child td{border-bottom:none;}
.lb-table tr:hover td{background:#f9f8f7;}
.lb-table tr.tied td:first-child{border-left:3px solid #0078d4;}
.sl-cell{font-size:12px;color:#a19f9d;text-align:center;width:28px;}
.rank-cell{text-align:center;width:50px;}
.medal-emoji{font-size:20px;line-height:1;}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:22px;border-radius:4px;font-size:12px;font-weight:700;background:#edebe9;color:#605e5c;}
.name-cell{font-size:13px;font-weight:600;}
.name-cell.dimmed{color:#a19f9d;font-weight:400;}
.tied-tag{font-size:10px;color:#0078d4;margin-left:4px;font-weight:400;}
.inv-tag{font-size:10px;color:#c4314b;margin-left:4px;font-weight:400;}
.stat-cell{text-align:center;width:52px;}
.stat-btn{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:26px;border-radius:5px;font-size:13px;font-weight:700;border:none;background:transparent;cursor:default;padding:0 4px;}
.stat-btn.clickable{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.stat-btn.clickable:active{transform:scale(.92);}
.stat-btn.exact-c{background:#fff4ce;color:#7d5a00;}
.stat-btn.diff-c{background:#dae8f6;color:#004e8c;}
.stat-btn.res-c{background:#dff6dd;color:#0a5c0a;}
.stat-btn.zero{color:#c8c6c4;}
.pts-cell{text-align:right;width:44px;padding-right:10px!important;}
.pts-val{font-size:19px;font-weight:700;}
.pts-blue{color:#0078d4;}.pts-green{color:#107c10;}.pts-grey{color:#c8c6c4;}
.hover-hint{font-size:11px;color:#a19f9d;text-align:center;margin-bottom:10px;padding:6px;background:#faf9f8;border-radius:4px;}
@media(max-width:600px){
  .summary-row{gap:8px;}.stat-val{font-size:20px;}
  .lb-table th,.lb-table td{padding:7px 3px;}
  .name-cell{font-size:12px;}.pts-val{font-size:16px;}
  .panel{padding:10px;}.stat-btn{min-width:24px;height:22px;font-size:12px;}
}

/* Screenshot / print fix — removes sticky header so full page captures cleanly */
@media print {
  .sticky-top { position: relative !important; }
  body { overflow: visible !important; }
  .panel { display: block !important; }
  #panel-matches { display: none !important; }
}

/* Force all leaderboard rows to always render (no lazy/virtual rendering) */
.lb-table tbody tr { display: table-row !important; visibility: visible !important; }
</style>
</head>
<body>
<div class="sticky-top">
  <div class="header">
    <h1>⚽ FIFA World Cup 2026 — Prediction Tracker</h1>
    <div class="header-sub">PDC Friends 1991-93 · Group Stage</div>
    <div class="header-meta">Scoring: 3 pts exact · 2 pts right goal diff · 1 pt correct result</div>
    <div class="header-rule">⛔ Predictions submitted at or after kickoff are excluded from scoring</div>
    <div class="header-updated" id="lastUpdated"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('matches')">⚽ Matches</button>
    <button class="tab" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
  </div>
</div>
<div id="panel-matches" class="panel active">
  <div class="loading" id="loadingMatches"><div class="loading-spinner"></div>Loading latest data…</div>
  <div id="matchSearchWrap" class="search-wrap" style="display:none;">
    <input class="search-input" id="matchSearch" type="text"
      placeholder="🔍  Search by country name…" oninput="filterMatches(this.value)">
    <button class="search-clear" id="matchSearchClear" onclick="clearSearch()">×</button>
  </div>
  <div id="matchesContent" style="display:none;"></div>
</div>
<div id="panel-leaderboard" class="panel">
  <div class="loading" id="loadingLB"><div class="loading-spinner"></div>Loading leaderboard…</div>
  <div id="lbSearchWrap" class="search-wrap" style="display:none;">
    <input class="search-input" id="lbSearch" type="text"
      placeholder="🔍  Search by player name…" oninput="filterLB(this.value)">
    <button class="search-clear" id="lbSearchClear" onclick="clearLBSearch()">×</button>
  </div>
  <div id="lbContent" style="display:none;"></div>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal-sheet" id="modalSheet">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>
<script>
let state={predictions:[],matches:{}};
const COLORS=['#5ba7e0','#e8a068','#a78de8','#e87878','#6ecfae','#e8c968','#7bb87b','#c09060','#e06090','#60c0e0'];
const AVCOLS=['#0078d4','#107c10','#7719aa','#b33d00','#008272','#c43501','#004e8c','#1e7145'];

function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['matches','leaderboard'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
}

async function loadData(){
  try{
    const res=await fetch('data.json?v='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.meta){
      const upd=data.meta.updated+(data.meta.updated_time?' · '+data.meta.updated_time+' EST':'');
      document.getElementById('lastUpdated').textContent='📅 Last updated: '+upd+' · '+data.meta.matches_played+' matches played';
    }
    state.predictions=data.predictions||[];
    buildMatchState(data.results||{});
    renderMatches();renderLB();
    document.getElementById('loadingMatches').style.display='none';
    document.getElementById('matchesContent').style.display='block';
    document.getElementById('matchSearchWrap').style.display='block';
    document.getElementById('loadingLB').style.display='none';
    document.getElementById('lbContent').style.display='block';
    document.getElementById('lbSearchWrap').style.display='block';
  }catch(e){
    const msg='<p style="color:#c4314b;text-align:center;padding:40px;">⚠️ Could not load data. Please refresh.<br><small>'+e.message+'</small></p>';
    document.getElementById('loadingMatches').innerHTML=msg;
    document.getElementById('loadingLB').innerHTML=msg;
  }
}

function mkey(t1,t2){return[t1,t2].sort().join(' vs ');}

function buildMatchState(results){
  const m={};
  for(const p of state.predictions)
    for(const s of(p.scores||[])){
      const k=mkey(s.team1,s.team2);
      if(!m[k])m[k]={team1:s.team1,team2:s.team2,preds:[],actual:null,kickoff_est:s.kickoff_est||'',group:s.group||''};
      m[k].preds.push({name:p.name,score1:s.score1,score2:s.score2,
                       status:s.status||'valid',submitted_est:s.submitted_est||'',
                       kickoff_est:s.kickoff_est||'',group:s.group||''});
      if(!m[k].group&&s.group)m[k].group=s.group;
    }
  for(const v of Object.values(results)){
    const k=mkey(v.team1,v.team2);
    if(m[k])m[k].actual=v.score1+'-'+v.score2;
  }
  state.matches=m;
}

function getResult(a,b){return a>b?'w1':b>a?'w2':'d';}
function calcPts(ps1,ps2,as1,as2){
  if(ps1===as1&&ps2===as2)return 3;
  if(getResult(ps1,ps2)!==getResult(as1,as2))return 0;
  if((ps1-ps2)===(as1-as2))return 2;
  return 1;
}

function openModal(title,subtitle,bodyHTML){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalSubtitle').textContent=subtitle;
  document.getElementById('modalBody').innerHTML=bodyHTML;
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('modalSheet').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('modalSheet').classList.remove('show');
  document.body.style.overflow='';
}

function showBarDetail(matchKey,scoreStr){
  const m=state.matches[matchKey]; if(!m)return;
  const[s1,s2]=scoreStr.split('-').map(Number);
  // Only valid members for this score
  const members=m.preds.filter(p=>p.score1===s1&&p.score2===s2&&p.status!=='INVALID');
  if(members.length===0){showInvalidDetail(matchKey);return;}
  const res=getResult(s1,s2);
  const wl=res==='w1'?m.team1:res==='w2'?m.team2:'Draw';
  let pts=null;
  if(m.actual){const[as1,as2]=m.actual.split('-').map(Number);pts=calcPts(s1,s2,as1,as2);}
  const ptLabel=pts===3?'+3 pts (Exact!)':pts===2?'+2 pts (Right diff)':pts===1?'+1 pt (Right result)':pts===0?'0 pts':'Pending';
  const ptColor=pts===3?'#7d5a00':pts===2?'#004e8c':pts===1?'#0a5c0a':'#605e5c';
  const ptBg=pts===3?'#fff4ce':pts===2?'#dae8f6':pts===1?'#dff6dd':'#edebe9';
  let body=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px;background:#f9f8f7;border-radius:8px;">
    <div style="font-size:22px;font-weight:700;">${scoreStr}</div>
    <div><div style="font-size:13px;font-weight:600;">${wl}</div>
    <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:${ptBg};color:${ptColor};">${ptLabel}</span></div>
  </div>
  <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#a19f9d;margin-bottom:8px;">${members.length} member${members.length!==1?'s':''} predicted this</div>`;
  members.forEach((p,i)=>{
    const init=p.name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
    body+=`<div class="member-item">
      <div class="member-avatar" style="background:${AVCOLS[i%AVCOLS.length]};">${init}</div>
      <div style="flex:1;"><div class="member-name">${p.name}</div>
      ${p.submitted_est?'<div class="member-ts">Submitted: '+p.submitted_est+'</div>':''}</div>
    </div>`;
  });
  openModal(m.team1+' vs '+m.team2,'Prediction: '+scoreStr+' · '+wl,body);
}

function showInvalidDetail(matchKey){
  const m=state.matches[matchKey]; if(!m)return;
  const invPreds=m.preds.filter(p=>p.status==='INVALID');
  let body=`<div style="background:#fde7e9;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;font-weight:600;color:#c4314b;">
    ⛔ These predictions were submitted after the match kicked off and are excluded from scoring.</div>`;
  invPreds.forEach((p,i)=>{
    const init=p.name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
    const sc=p.score1+'-'+p.score2;
    const res=getResult(p.score1,p.score2);
    const wl=res==='w1'?(flag(m.team1)):res==='w2'?(flag(m.team2)):'Draw';
    body+=`<div class="member-item">
      <div class="member-avatar" style="background:#c4314b;">${init}</div>
      <div style="flex:1;"><div class="member-name">${p.name}</div>
      <div class="member-ts">Submitted: ${p.submitted_est}</div>
      <div class="member-ts">Kickoff: ${p.kickoff_est}</div></div>
      <div style="text-align:right;"><div style="font-size:13px;font-weight:700;">${sc}</div>
      <div style="font-size:11px;color:#605e5c;">${wl}</div></div>
    </div>`;
  });
  openModal(m.team1+' vs '+m.team2,'⛔ '+invPreds.length+' excluded prediction'+(invPreds.length!==1?'s':''),body);
}

function showStatByKey(key){
  const d=window._statData&&window._statData[key];
  if(d)showStatDetail(d.name,d.type,d.items);
}
function showStatDetail(name,type,items){
  const labels={exact:'Exact Scores (+3 each)',gdiff:'Right Goal Diff (+2 each)',result:'Correct Results (+1 each)'};
  const ptBgs={exact:'#fff4ce',gdiff:'#dae8f6',result:'#dff6dd'};
  const ptCols={exact:'#7d5a00',gdiff:'#004e8c',result:'#0a5c0a'};
  const init=name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const avatarColor=AVCOLS[name.charCodeAt(0)%AVCOLS.length];
  let body=`<div class="member-item" style="margin-bottom:12px;padding-bottom:12px;border-bottom:2px solid #edebe9;">
    <div class="member-avatar" style="background:${avatarColor};width:42px;height:42px;font-size:14px;">${init}</div>
    <div><div style="font-size:15px;font-weight:700;">${name}</div>
    <div style="font-size:12px;color:#605e5c;">${labels[type]} — ${items.length} match${items.length!==1?'es':''}</div></div>
  </div>`;
  items.forEach(it=>{
    const[st1,st2]=it.match.split(' vs ');
    body+=`<div class="member-item">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;">${flag(st1.trim())} vs ${flag(st2.trim())}</div>
        <div style="display:flex;gap:6px;align-items:center;font-size:12px;color:#605e5c;margin-top:2px;">
          Predicted: <b>${it.pred}</b> → Actual: <b>${it.actual}</b>
          <span style="font-size:11px;font-weight:700;padding:1px 6px;border-radius:4px;background:${ptBgs[type]};color:${ptCols[type]};">${type==='exact'?'+3':type==='gdiff'?'+2':'+1'}</span>
        </div>
      </div>
    </div>`;
  });
  openModal(name,labels[type]+' — '+items.length+' match'+(items.length!==1?'es':''),body);
}

function renderMatches(){
  const el=document.getElementById('matchesContent');
  // Sort matches by kickoff time (earliest first = chronological schedule order)
  const keys=Object.keys(state.matches).sort((a,b)=>{
    const ka=state.matches[a].kickoff_est||'';
    const kb=state.matches[b].kickoff_est||'';
    return new Date(ka)-new Date(kb);
  });
  const invalidList=[];
  for(const p of state.predictions)for(const s of p.scores)
    if(s.status==='INVALID')invalidList.push(p.name+' ('+s.team1+' vs '+s.team2+')');
  const resolved=keys.filter(k=>state.matches[k].actual).length;
  let html='';
  // Top invalid banner removed — invalid details shown per-match only
  html+=`<div class="summary-row">
    <div class="stat-card"><div class="stat-val">${keys.length}</div><div class="stat-lbl">Matches</div></div>
    <div class="stat-card"><div class="stat-val">${state.predictions.length}</div><div class="stat-lbl">Participants</div></div>
    <div class="stat-card"><div class="stat-val">${resolved}</div><div class="stat-lbl">Results In</div></div>
  </div><div class="match-grid">`;

  keys.forEach(key=>{
    const m=state.matches[key];
    const validPreds=m.preds.filter(p=>p.status!=='INVALID');
    const invalidPreds=m.preds.filter(p=>p.status==='INVALID');
    const total=validPreds.length;
    const validGroups={};
    for(const p of validPreds){const sc=p.score1+'-'+p.score2;if(!validGroups[sc])validGroups[sc]=[];validGroups[sc].push(p);}
    const sortedValid=Object.entries(validGroups).sort((a,b)=>b[1].length-a[1].length);
    const topValid=sortedValid[0];
    let ci=0;
    const bars=sortedValid.map(([sc,members])=>{
      const pct=total>0?Math.round(members.length/total*100):0;
      const[s1,s2]=sc.split('-').map(Number);
      const res=getResult(s1,s2);
      const wl=res==='w1'?(flag(m.team1)):res==='w2'?(flag(m.team2)):'Draw';
      let pip='';
      if(m.actual){const[as1,as2]=m.actual.split('-').map(Number);const pts=calcPts(s1,s2,as1,as2);
        if(pts===3)pip='<span class="pip pip3">+3</span>';
        else if(pts===2)pip='<span class="pip pip2">+2</span>';
        else if(pts===1)pip='<span class="pip pip1">+1</span>';}
      const color=COLORS[ci%COLORS.length];ci++;
      const nameList=members.map(p=>p.name);
      const label=nameList.length>2?nameList.length+' members':(nameList.length===2?nameList[0].split(' ')[0]+' +1':nameList[0]);
      return`<div class="pred-row" onclick="showBarDetail('${key}','${sc}')" title="Tap to see members">
        <div class="pred-label">${label}</div>
        <div class="pred-bar-wrap"><div class="pred-bar" style="width:${Math.max(pct,6)}%;background:${color};"><span>${sc} · ${wl}</span></div></div>
        <div style="display:flex;align-items:center;gap:2px;flex-shrink:0;"><div class="pred-pct">${pct}%</div>${pip}</div>
      </div>`;
    }).join('');
    // Invalid section — single clickable summary line only (no individual rows shown)
    let invSection='';
    if(invalidPreds.length>0){
      invSection=`<div style="border-top:1.5px dashed #fca5a5;margin-top:8px;padding-top:8px;">
        <span onclick="showInvalidDetail('${key}')"
          title="Tap to see invalid predictions"
          style="cursor:pointer;font-size:12px;font-weight:700;color:#c4314b;
                 display:inline-flex;align-items:center;gap:6px;padding:4px 0;">
          ⛔ Excluded — submitted after kickoff (${invalidPreds.length})
          <span style="font-size:10px;color:#a19f9d;font-weight:400;">↗ tap for details</span>
        </span>
      </div>`;
    }
    const isResult=!!m.actual;
    const grp=m.group||'';
    const grpBadge=grp?`<span class="group-badge">Group ${grp}</span>`:'';
    const consensusRow=topValid?`<div class="consensus-row"><span style="color:#605e5c;">Most backed:</span><span style="font-weight:600;margin-left:4px;">${topValid[0]}</span><span style="color:#605e5c;margin-left:4px;">(${topValid[1].length} of ${total})</span></div>`:'';
    html+=`<div class="match-card" data-teams="${m.team1.toLowerCase()} ${m.team2.toLowerCase()}">
      <div class="match-header"><div class="match-title">${flag(m.team1)} vs ${flag(m.team2)}${grpBadge}</div>
      <span class="match-badge ${isResult?'badge-result':'badge-pending'}">${isResult?'&#10003; '+m.actual:'Pending'}</span></div>
      <div class="match-body">${bars}${consensusRow}${invSection}</div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function calcAllScores(){
  const scores={};
  for(const p of state.predictions)scores[p.name]={pts:0,exact:[],gdiff:[],result:[],played:0,invalidCount:0};
  for(const m of Object.values(state.matches)){
    if(!m.actual)continue;
    const[as1,as2]=m.actual.split('-').map(Number);
    const matchLabel=m.team1+' vs '+m.team2;
    for(const p of m.preds){
      if(!scores[p.name])scores[p.name]={pts:0,exact:[],gdiff:[],result:[],played:0,invalidCount:0};
      if(p.status==='INVALID'){scores[p.name].invalidCount++;continue;}
      const pts=calcPts(p.score1,p.score2,as1,as2);
      scores[p.name].played++;scores[p.name].pts+=pts;
      const pred=p.score1+'-'+p.score2;
      if(pts===3)scores[p.name].exact.push({match:matchLabel,pred,actual:m.actual});
      else if(pts===2)scores[p.name].gdiff.push({match:matchLabel,pred,actual:m.actual});
      else if(pts===1)scores[p.name].result.push({match:matchLabel,pred,actual:m.actual});
    }
  }
  return Object.entries(scores).sort((a,b)=>b[1].pts-a[1].pts||b[1].exact.length-a[1].exact.length||b[1].gdiff.length-a[1].gdiff.length);
}

function denseRanks(ranked){
  const out=[];let cur=0,pk=null;
  for(const[,s]of ranked){const k=s.pts+'|'+s.exact.length+'|'+s.gdiff.length;if(k!==pk){cur++;pk=k;}out.push(cur);}
  return out;
}

const MEDALS={1:'🥇',2:'🥈',3:'🥉'};

function renderLB(){
  const el=document.getElementById('lbContent');
  const ranked=calcAllScores();
  const ranks=denseRanks(ranked);
  const rankCounts={};ranks.forEach(r=>{rankCounts[r]=(rankCounts[r]||0)+1;});
  window._statData={};
  let html=`<div class="hover-hint">💡 Tap coloured numbers under EXACT · DIFF · RESULT to see match details</div>
  <div class="lb-wrap"><table class="lb-table">
    <thead><tr><th style="width:28px;">SL</th><th style="width:50px;">RANK</th>
    <th class="left">PLAYER</th><th>EXACT</th><th>DIFF</th><th>RESULT</th>
    <th class="right" style="padding-right:10px;">PTS</th></tr></thead><tbody>`;

  ranked.forEach(([name,s],i)=>{
    const rank=ranks[i];const tied=rankCounts[rank]>1&&rank<=3;
    const uid=name.replace(/[^a-zA-Z0-9]/g,'_')+'_'+i;
    const medal=MEDALS[rank];
    // Store stat data safely
    window._statData[uid+'_exact']={name,type:'exact',items:s.exact};
    window._statData[uid+'_gdiff']={name,type:'gdiff',items:s.gdiff};
    window._statData[uid+'_result']={name,type:'result',items:s.result};
    const sc=(val,type)=>{
      if(val===0)return`<td class="stat-cell"><button class="stat-btn zero">${val}</button></td>`;
      const colClass=type==='exact'?'exact-c':type==='gdiff'?'diff-c':'res-c';
      return`<td class="stat-cell"><button class="stat-btn clickable ${colClass}" onclick="showStatByKey('${uid+'_'+type}')">${val}</button></td>`;
    };
    html+=`<tr class="${tied?'tied':''}" data-name="${name.toLowerCase()}">
      <td class="sl-cell">${i+1}</td>
      <td class="rank-cell">${medal?'<span class="medal-emoji">'+medal+'</span>':'<span class="rank-badge">'+rank+'</span>'}</td>
      <td class="name-cell${s.pts===0?' dimmed':''}">
        ${name}${tied?'<span class="tied-tag">tied</span>':''}${s.invalidCount>0?'<span class="inv-tag">⛔'+s.invalidCount+' invalid</span>':''}
      </td>
      ${sc(s.exact.length,'exact')}${sc(s.gdiff.length,'gdiff')}${sc(s.result.length,'result')}
      <td class="pts-cell"><span class="pts-val ${s.pts>=6?'pts-blue':s.pts>0?'pts-green':'pts-grey'}">${s.pts}</span></td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

function flag(t){return(FLAGS[t]||'')+(FLAGS[t]?' ':'')+t;}

function filterMatches(q){
  q=q.trim().toLowerCase();
  document.getElementById('matchSearchClear').classList.toggle('show', q.length>0);
  const cards=document.querySelectorAll('#matchesContent .match-card');
  let visible=0;
  cards.forEach(card=>{
    const teams=card.getAttribute('data-teams')||'';
    const show=!q||teams.includes(q);
    card.style.display=show?'':'none';
    if(show)visible++;
  });
  // Show/hide no-match message
  let nm=document.getElementById('noMatchMsg');
  if(!nm){nm=document.createElement('div');nm.id='noMatchMsg';nm.className='no-match';document.getElementById('matchesContent').appendChild(nm);}
  nm.style.display=visible===0&&q?'block':'none';
  nm.textContent=visible===0&&q?'No matches found for "'+q+'"':'';
}

function filterLB(q){
  q=q.trim().toLowerCase();
  document.getElementById('lbSearchClear').classList.toggle('show',q.length>0);
  const rows=document.querySelectorAll('#lbContent .lb-table tbody tr');
  let visible=0;
  rows.forEach(row=>{
    const name=row.getAttribute('data-name')||'';
    const show=!q||name.toLowerCase().includes(q);
    row.style.display=show?'':'none';
    if(show)visible++;
  });
  let nm=document.getElementById('lbNoMatch');
  if(!nm){nm=document.createElement('div');nm.id='lbNoMatch';nm.className='no-match';document.getElementById('lbContent').appendChild(nm);}
  nm.style.display=visible===0&&q?'block':'none';
  nm.textContent=visible===0&&q?'No player found for "'+q+'"':'';
}
